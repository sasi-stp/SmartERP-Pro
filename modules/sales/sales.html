<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Module | Smart ERP Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sales.css">
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <h1>Sales Management</h1>
            <p>Create invoices, manage customers and products</p>
        </div>

        <button id="backDashboard">← Dashboard</button>
    </div>

    <!-- Sales Toolbar -->
    <div class="toolbar">
        <button id="customerBtn">+ Customer</button>
        <button id="productBtn">+ Product</button>
        <button id="historyBtn">Invoice History</button>
    </div>

    <!-- Invoice Details -->
    <div class="card">
        <h2>Invoice Details</h2>

        <div class="grid">
            <div>
                <label>Invoice No</label>
                <input type="text" id="invoiceNo" readonly>
            </div>

            <div>
                <label>Date</label>
                <input type="date" id="invoiceDate">
            </div>
        </div>
    </div>

    <!-- Customer -->
    <div class="card">
        <h2>Customer</h2>

        <div class="grid">
            <div>
                <label>Customer</label>
                <select id="customer">
                    <option value="">Select Customer</option>
                </select>
            </div>

            <div>
                <label>Phone</label>
                <input type="text" id="phone" readonly>
            </div>
        </div>
    </div>

    <!-- Product -->
    <div class="card">
        <h2>Product</h2>

        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Available Stock</th>
                    <th>Qty</th>
                    <th>Unit Price</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>
                        <select id="product">
                            <option value="">Select Product</option>
                        </select>
                    </td>

                    <td>
                        <input type="text" id="availableStock" readonly>
                    </td>

                    <td>
                        <input type="number" id="qty" value="1" min="1">
                    </td>

                    <td>
                        <input type="number" id="price" readonly>
                    </td>

                    <td>
                        <input type="text" id="total" readonly>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Payment -->
    <div class="card">
        <h2>Payment</h2>

        <div class="grid">
            <div>
                <label>Grand Total</label>
                <input type="text" id="grandTotal" readonly>
            </div>

            <div>
                <label>Paid Amount</label>
                <input type="number" id="paid" placeholder="0">
            </div>

            <div>
                <label>Balance</label>
                <input type="text" id="balance" readonly>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="buttons">
        <button id="saveBtn">Save Invoice</button>
        <button id="printBtn">Print</button>
        <button id="clearBtn">Clear</button>
        <button id="whatsappBtn">WhatsApp</button>
    </div>

</div>

<script src="sales.js"></script>
</body>
</html>
